name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev

      - name: Create log directory
        run: mkdir -p logs
        shell: bash

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug 2>&1 | tee logs/configure.log
        shell: bash

      - name: Build
        run: cmake --build build --config Debug 2>&1 | tee logs/build.log
        shell: bash

      - name: Run tests
        run: ctest --test-dir build --build-config Debug --output-on-failure 2>&1 | tee logs/test.log
        shell: bash

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.name }}
          path: logs/
